<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학교생활 브라우저</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8F9FA;
      --white: #FFFFFF;
      --primary: #4A6CF7;
      --primary-light: #E8EEFF;
      --text: #333333;
      --text-light: #888888;
      --border: #E5E7EB;
      --danger: #EF4444;
      --warning: #F59E0B;
      --success: #10B981;
      --nav-h: 72px;
      --header-h: 56px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ===== 상단 헤더 ===== */
    .top-header {
      height: var(--header-h);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 50;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-profile {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .header-profile-info {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-profile-info .header-name {
      font-size: 11px;
      color: var(--text-light);
    }
    .top-header h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--primary);
      margin: 0;
      line-height: 1.2;
    }
    .admin-data-btn {
      background: #FEF3C7;
      color: #D97706;
      border: 1px solid #FCD34D;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .admin-data-btn:hover { background: #FDE68A; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .role-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
    }
    .role-badge.student { background: #DBEAFE; color: #2563EB; }
    .role-badge.teacher { background: #FEE2E2; color: #DC2626; }
    .role-badge.admin { background: #FEF3C7; color: #D97706; }
    .header-name { font-size: 13px; }
    .logout-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 4px;
    }
    .logout-btn:hover { background: var(--bg); }

    /* ===== 하단 네비게이션 ===== */
    .bottom-nav {
      height: var(--nav-h);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      z-index: 50;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text-light);
      transition: all 0.15s;
      padding: 4px 0;
      border: none;
      background: none;
      font-family: inherit;
    }
    .nav-item.active { color: var(--primary); font-weight: 500; }
    .nav-item[data-page="home"] { position: relative; }
    .nav-item[data-page="home"] .nav-icon {
      font-size: 26px;
      background: var(--primary);
      color: white;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin-top: -16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: transform 0.15s;
    }
    .nav-item[data-page="home"]:active .nav-icon { transform: scale(0.93); }
    .nav-item[data-page="home"] .nav-label { margin-top: 2px; font-weight: 600; }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 10px; }

    /* ===== 메인 콘텐츠 ===== */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      padding-bottom: calc(var(--nav-h) + 16px);
      -webkit-overflow-scrolling: touch;
    }
    .page { display: none; }
    .page.active { display: block; }

    /* 홈 화면 중앙 정렬 */
    .search-bar {
      width: 100%;
      max-width: 320px;
      display: flex;
      align-items: center;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 12px;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .search-bar:focus-within { border-color: var(--primary); }
    .search-icon { font-size: 16px; flex-shrink: 0; }
    .search-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      background: transparent;
      color: var(--text);
    }
    .search-input::placeholder { color: #bbb; }
    .search-clear {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      color: #aaa;
      padding: 2px;
      line-height: 1;
    }
    .search-clear:hover { color: #666; }
    .search-results {
      width: 100%;
      max-width: 320px;
      text-align: left;
    }
    .search-results.hidden { display: none; }
    .search-results .card { width: 100%; margin-bottom: 8px; }
    .search-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 4px;
    }
    .search-tag.memo { background: #DBEAFE; color: #2563EB; }
    .search-tag.homework { background: #FEF3C7; color: #D97706; }
    .search-tag.notice { background: #FEE2E2; color: #DC2626; }
    .search-tag.timetable { background: #D1FAE5; color: #059669; }
    .search-tag.calendar { background: #EDE9FE; color: #7C3AED; }
    .search-tag.meal { background: #FCE7F3; color: #DB2777; }

    #page-home {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-h) - var(--nav-h) - 32px);
      text-align: center;
    }
    #page-home.active {
      display: flex;
    }
    #page-home .card {
      width: 100%;
      max-width: 320px;
    }
    #page-home .quick-menu {
      width: 100%;
      max-width: 320px;
    }

    /* ===== 페이지 공통 ===== */
    .page-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    /* ===== 카드 ===== */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-light);
      margin-bottom: 10px;
    }

    /* ===== 홈 화면 ===== */
    .clock-card {
      text-align: center;
      padding: 24px 16px;
      margin-bottom: 12px;
    }
    .clock-time {
      font-size: 48px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1;
      letter-spacing: 2px;
    }
    .clock-date {
      font-size: 14px;
      color: var(--text-light);
      margin-top: 8px;
    }
    .clock-day {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 12px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .stat-card {
      text-align: center;
      padding: 16px 8px;
    }
    .stat-num {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-num.danger { color: var(--danger); }
    .stat-num.warning { color: var(--warning); }
    .stat-num.success { color: var(--success); }
    .stat-label {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 6px;
    }

    .notice-list { list-style: none; }
    .notice-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .notice-item:last-child { border-bottom: none; }
    .notice-badge {
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .notice-badge.important { background: #FEE2E2; color: var(--danger); }
    .notice-badge.normal { background: var(--bg); color: var(--text-light); }
    .notice-date { color: var(--text-light); font-size: 11px; margin-left: auto; flex-shrink: 0; }

    .quick-menu {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .quick-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 14px 4px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .quick-btn:active { transform: scale(0.96); background: var(--primary-light); }
    .quick-icon { font-size: 22px; }
    .quick-label { font-size: 11px; color: var(--text); }

    /* ===== 시간표 (세로 스크롤형) ===== */
    .tt-class-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .tt-class-tab {
      flex-shrink: 0;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text);
    }
    .tt-class-tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .timetable-scroll {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      max-height: 55vh;
    }
    .timetable-grid {
      display: grid;
      grid-template-columns: 44px repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      min-width: 320px;
    }
    .tt-header {
      background: var(--primary);
      color: white;
      padding: 10px 2px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
    }
    .tt-period {
      background: var(--bg);
      padding: 10px 2px;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tt-cell {
      background: var(--white);
      padding: 8px 4px;
      text-align: center;
      font-size: 11px;
      min-height: 48px;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tt-cell:active { background: var(--primary-light); }
    .tt-cell .subject-tag {
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
      letter-spacing: 0.3px;
      line-height: 1.3;
    }

    /* ===== 모달 ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 16px 16px 0 0;
      padding: 24px 20px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
      width: 100%;
      max-width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal h3 {
      font-size: 17px;
      margin-bottom: 16px;
      text-align: center;
    }
    .modal input, .modal textarea, .modal select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus {
      border-color: var(--primary);
    }
    .modal textarea { resize: vertical; min-height: 80px; }
    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
    }
    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }
    .btn-danger {
      background: var(--danger);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }

    /* 색상 선택 */
    .color-options {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .color-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .color-dot.selected { border-color: var(--text); }

    /* ===== 알림장 / 공지 / 숙제 공통 ===== */
    .add-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 14px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .add-btn:active { transform: scale(0.98); }
    .item-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .item-card .item-body { flex: 1; min-width: 0; }
    .item-card .item-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .item-card .item-desc { font-size: 12px; color: var(--text-light); line-height: 1.4; }
    .item-card .item-date { font-size: 11px; color: var(--text-light); margin-top: 4px; }
    .item-card .item-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .item-card .item-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 6px;
    }
    .item-card .item-actions button:active { background: var(--bg); }

    .checkbox {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin-top: 2px;
    }
    .checkbox.checked {
      background: var(--success);
      border-color: var(--success);
      color: white;
      font-size: 13px;
    }
    .item-card.completed .item-title {
      text-decoration: line-through;
      color: var(--text-light);
    }
    .priority-tag {
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
    }
    .priority-tag.high { background: #FEE2E2; color: var(--danger); }
    .priority-tag.medium { background: #FEF3C7; color: #D97706; }
    .priority-tag.low { background: var(--bg); color: var(--text-light); }

    /* ===== 캘린더 ===== */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-header h3 { font-size: 16px; }
    .cal-nav {
      display: flex;
      gap: 8px;
    }
    .cal-nav button {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }
    .cal-nav button:active { background: var(--bg); }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .cal-day-header {
      background: var(--primary);
      color: white;
      padding: 6px 2px;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
    }
    .cal-day {
      background: var(--white);
      padding: 4px;
      min-height: 48px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .cal-day:active { background: var(--primary-light); }
    .cal-day.today { background: #EEF2FF; }
    .cal-day.other-month { color: #CCC; }
    .cal-day-num { font-weight: 500; margin-bottom: 2px; text-align: center; }
    .cal-event {
      background: var(--primary-light);
      color: var(--primary);
      padding: 1px 3px;
      border-radius: 2px;
      font-size: 8px;
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== 급식 ===== */
    .meal-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
      justify-content: center;
    }
    .meal-nav button {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }
    .meal-nav button:active { background: var(--bg); }
    .meal-date { font-size: 14px; font-weight: 500; }
    .meal-list { list-style: none; }
    .meal-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .meal-item:last-child { border-bottom: none; }
    .meal-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      min-width: 50px;
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-light);
    }
    .empty-state .empty-icon { font-size: 32px; margin-bottom: 6px; }
    .empty-state .empty-text { font-size: 13px; }

    /* ===== 로그인 화면 ===== */
    .login-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .login-screen.hidden { display: none; }
    .hidden { display: none !important; }
    .login-box {
      background: var(--white);
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    #stepRole, #stepLogin {
      transition: opacity 0.25s, transform 0.25s;
    }
    #stepRole.slide-out {
      opacity: 0;
      transform: translateX(-40px);
    }
    #stepLogin.slide-in {
      opacity: 1;
      transform: translateX(0);
    }
    #stepLogin {
      opacity: 0;
      transform: translateX(40px);
    }
    #stepLogin:not(.hidden) {
      opacity: 1;
      transform: translateX(0);
    }
    .login-logo { font-size: 48px; margin-bottom: 8px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .login-subtitle { font-size: 12px; color: var(--text-light); margin-bottom: 24px; }

    .role-select {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .role-card {
      flex: 1;
      padding: 16px 8px;
      border: 2px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .role-card:active { transform: scale(0.97); }

  function goPage(page) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.page === page));

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clockTime').textContent = h + ':' + m + ':' + s;
    document.getElementById('clockDate').textContent =
      now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일';
    document.getElementById('clockDay').textContent = DAYS[now.getDay()];
    document.getElementById('clockDay').style.background = DAY_COLORS[now.getDay()] + '22';
    document.getElementById('clockDay').style.color = DAY_COLORS[now.getDay()];
  }
  setInterval(updateClock, 1000);

  function renderHome() {
    // 다국어 텍스트
    document.getElementById('homeRemainHw').textContent = t('remainHw');
    document.getElementById('homeUrgentHw').textContent = t('urgentHw');
    document.getElementById('homeRecentMemo').textContent = t('recentMemo');
    document.getElementById('homeQuickMenu').textContent = t('quickMove');
    document.getElementById('qlTimetable').textContent = t('timetable');
    document.getElementById('qlMemo').textContent = t('memo');
    document.getElementById('qlHomework').textContent = t('homework');
    document.getElementById('qlNotice').textContent = t('notice');
    document.getElementById('qlCalendar').textContent = t('calendar');
    document.getElementById('qlMeal').textContent = t('meal');

    // 환영 메시지
    if (currentUser) {
      document.getElementById('homeWelcome').textContent = currentUser.name + t('welcome');
    }

    // 숙제 현황
    const today = new Date();
    const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    let pending = appData.homeworks.filter(h => !h.done);
    // 학생은自己이 쓴 숙제 + 선생님/관리자가 쓴 숙제
    if (isStudent()) {
      pending = pending.filter(h => h.author === currentUser.name || h.role === 'teacher' || h.role === 'admin');
    }
    const urgent = pending.filter(h => {
      const diff = (new Date(h.dueDate) - new Date(todayStr)) / 86400000;
      return diff >= 0 && diff <= 3;
    });
    document.getElementById('hwPending').textContent = pending.length;
    document.getElementById('hwUrgent').textContent = urgent.length;

    // 최근 알림장
    const list = document.getElementById('homeNoticeList');
    let recent = [...appData.memos].sort((a,b) => b.date.localeCompare(a.date));
    // 학생은自己이 쓴 알림장 + 선생님이 쓴 알림장만
    if (isStudent()) {
      recent = recent.filter(m => m.author === currentUser.name || m.role === 'teacher' || m.role === 'admin');
    }
    recent = recent.slice(0,3);
    if (recent.length === 0) {
      list.innerHTML = '<li class="notice-item" style="color:var(--text-light);">알림장이 없습니다</li>';
    } else {
      list.innerHTML = recent.map(m => {
        var fileBadge = (m.files && m.files.length > 0) ? ' 📎' : '';
        return `
        <li class="notice-item">
          <span class="notice-badge ${m.role === 'teacher' ? 'important' : (m.role === 'admin' ? 'important' : 'normal')}">${m.role === 'teacher' ? '선생님' : (m.role === 'admin' ? '관리자' : '메모')}</span>
          <span>${m.title}${fileBadge}</span>
          <span class="notice-date">${m.date}</span>
        </li>`;
      }).join('');
    }

    document.getElementById('schoolName').textContent = appData.schoolName;
  }

     ============================================================ */
  const PERIODS = [1,2,3,4,5,6,7];
  const WEEKDAYS = ['월','화','수','목','금'];
  const SUBJECT_COLORS_LIST = [
    '#4A6CF7','#10B981','#F59E0B','#EF4444','#8B5CF6',
    '#EC4899','#06B6D4','#F97316','#6366F1','#14B8A6',
    '#84CC16','#E11D48'
  ];

  function renderTimetable() {
    const container = document.getElementById('timetableGrid');
    const tt = appData.timetables[currentTimetableClass] || {};
    let html = '<div class="tt-header"></div>';
    WEEKDAYS.forEach(d => html += `<div class="tt-header">${d}</div>`);
    PERIODS.forEach(p => {
      html += `<div class="tt-period">${p}교시</div>`;
      WEEKDAYS.forEach((d, di) => {
        const key = (p-1) + '-' + di;
        const cell = tt[key];
        if (cell) {
          html += `<div class="tt-cell" onclick="editTimetable(${p-1},${di})">
            <span class="subject-tag" style="background:${cell.color}30;color:${cell.color};border:1px solid ${cell.color}44;">${cell.subject}</span>
          </div>`;
        } else {
          html += `<div class="tt-cell" onclick="editTimetable(${p-1},${di})">-</div>`;
        }
      });
    });
    container.innerHTML = html;
  }

  function switchTimetable(cls) {
    currentTimetableClass = cls;
    document.querySelectorAll('.tt-class-tab').forEach(t => t.classList.toggle('active', t.dataset.class === cls));
    renderTimetable();
  }

  function editTimetable(row, col) {
    const key = row + '-' + col;
    const tt = appData.timetables[currentTimetableClass] = appData.timetables[currentTimetableClass] || {};
    const existing = tt[key];
    openModal(`
      <h3>${currentTimetableClass} · ${WEEKDAYS[col]} ${row+1}교시 과목</h3>
      <input id="mSubject" placeholder="과목명 (예: 국어)" value="${existing ? existing.subject : ''}">
      <div class="card-title">색상</div>
      <div class="color-options" id="mColors">
        ${SUBJECT_COLORS_LIST.map((c,i) =>
          `<div class="color-dot ${existing && existing.color===c ? 'selected' : (!existing && i===0 ? 'selected' : '')}"
            style="background:${c}" data-color="${c}" onclick="pickColor(this)"></div>`
        ).join('')}
      </div>
      <div class="modal-btns">
        ${existing ? '<button class="btn-danger" onclick="removeTimetable('+row+','+col+')">삭제</button>' : ''}
        <button class="btn-secondary" onclick="closeModal()">취소</button>
        <button class="btn-primary" onclick="saveTimetable(${row},${col})">저장</button>
      </div>
    `);
  }
  function pickColor(el) {
    el.parentElement.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
  }
  function saveTimetable(row, col) {
    const subject = document.getElementById('mSubject').value.trim();
    if (!subject) return;
    const color = document.querySelector('#mColors .color-dot.selected')?.dataset.color || SUBJECT_COLORS_LIST[0];
    appData.timetables[currentTimetableClass] = appData.timetables[currentTimetableClass] || {};
    appData.timetables[currentTimetableClass][row + '-' + col] = { subject, color };
    save();
    closeModal();
    renderTimetable();
  }
  function removeTimetable(row, col) {
    appData.timetables[currentTimetableClass] = appData.timetables[currentTimetableClass] || {};
    delete appData.timetables[currentTimetableClass][row + '-' + col];
    save();
    closeModal();
    renderTimetable();
  }

  /* ============================================================
     6. 알림장
     ============================================================ */
  function renderMemos() {
    const list = document.getElementById('memoList');
    let sorted = [...appData.memos].sort((a,b) => b.date.localeCompare(a.date));
    // 학생은自己이 쓴 알림장만 보이게 (선생님은 모두 볼 수 있음)
    if (isStudent()) {
      sorted = sorted.filter(m => m.author === currentUser.name || m.role === 'teacher' || m.role === 'admin');
    }
    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">알림장이 없습니다</div></div>';
      return;
    }
    list.innerHTML = sorted.map(m => {
      const editable = canEdit(m);
      var fileHtml = '';
      if (m.files && m.files.length > 0) {
        fileHtml = '<div class="file-preview">' + m.files.map(function(f) {
          if (f.type && f.type.startsWith('image/')) {
            return '<img src="' + f.data + '" alt="' + esc(f.name) + '" onclick="window.open(\'' + f.data + '\')">';
          } else {
            return '<a href="' + f.data + '" download="' + esc(f.name) + '">📄 ' + esc(f.name) + '</a>';
          }
        }).join('<br>') + '</div>';
      }
      return `
      <div class="item-card" style="border-left:4px solid ${m.color || '#4A6CF7'};">
        <div class="item-body">
          <div class="item-title">${esc(m.title)}</div>
          <div class="item-desc">${esc(m.content)}</div>
          ${fileHtml}
          <div class="item-date">${m.date} · ${m.author || '익명'}${m.role === 'teacher' ? ' (선생님)' : (m.role === 'admin' ? ' (관리자)' : '')}</div>
        </div>
        <div class="item-actions">
          ${editable ? `<button onclick="editMemo('${m.id}')" title="수정">✏️</button>` : ''}
          ${editable ? `<button onclick="deleteMemo('${m.id}')" title="삭제">🗑️</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }
  var pendingFiles = [];

  function openMemoModal(id) {
    const m = id ? appData.memos.find(x => x.id === id) : null;
    pendingFiles = (m && m.files) ? [...m.files] : [];
    openModal(`
      <h3>${m ? '알림장 수정' : '알림장 작성'}</h3>
      <input id="mTitle" placeholder="제목" value="${m ? esc(m.title) : ''}">
      <textarea id="mContent" placeholder="내용">${m ? esc(m.content) : ''}</textarea>
      <div class="card-title">색상</div>
      <div class="color-options" id="mColors">
        ${SUBJECT_COLORS_LIST.map((c,i) =>
          `<div class="color-dot ${m && m.color===c ? 'selected' : (!m && i===0 ? 'selected' : '')}"
            style="background:${c}" data-color="${c}" onclick="pickColor(this)"></div>`
        ).join('')}
      </div>
      <div class="card-title">첨부파일</div>
      <div class="file-upload-area" onclick="document.getElementById('memoFileInput').click()">
        <input type="file" id="memoFileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt,.ppt,.pptx,.xls,.xlsx,.zip" onchange="handleMemoFiles(this)">
        <div class="file-upload-label">
          <span class="upload-icon">📎</span>
          클릭하여 파일 첨부 (이미지, PDF, 문서 등)
        </div>
      </div>
      <div class="file-list" id="memoFileList">${renderPendingFiles('memo')}</div>
      <div class="modal-btns">
        <button class="btn-secondary" onclick="closeModal()">취소</button>
        <button class="btn-primary" onclick="saveMemo('${id || ''}')">저장</button>
      </div>
    `);
  }

  function handleMemoFiles(input) {
    Array.from(input.files).forEach(f => {
      if (f.size > 2 * 1024 * 1024) { alert(f.name + '은(는) 2MB 이하만 첨부 가능합니다.'); return; }
      var reader = new FileReader();
      reader.onload = function(e) {
        pendingFiles.push({ name: f.name, type: f.type, data: e.target.result });
        document.getElementById('memoFileList').innerHTML = renderPendingFiles('memo');
      };
      reader.readAsDataURL(f);
    });
    input.value = '';
  }

  function removePendingFile(idx) {
    pendingFiles.splice(idx, 1);
    var el = document.getElementById('memoFileList') || document.getElementById('hwFileList');
    if (el) el.innerHTML = renderPendingFiles(el.id === 'hwFileList' ? 'hw' : 'memo');
  }

  function renderPendingFiles(type) {
    return pendingFiles.map((f, i) => {
      var icon = f.type && f.type.startsWith('image/') ? '🖼️' : '📄';
      return '<div class="file-item"><span>' + icon + '</span><span class="file-item-name">' + esc(f.name) + '</span><button class="file-item-remove" onclick="removePendingFile(' + i + ')">✕</button></div>';
    }).join('');
  }
  function saveMemo(id) {
    const title = document.getElementById('mTitle').value.trim();
    const content = document.getElementById('mContent').value.trim();
    if (!title) return;
    const color = document.querySelector('#mColors .color-dot.selected')?.dataset.color || '#4A6CF7';
    const today = new Date();
    const dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    if (id) {
      const m = appData.memos.find(x => x.id === id);
      if (m) { m.title = title; m.content = content; m.color = color; m.files = [...pendingFiles]; }
    } else {
      appData.memos.push({ id: 'memo_' + Date.now(), title, content, color, date: dateStr, author: currentUser.name, role: currentUser.role, files: [...pendingFiles] });
    }
    pendingFiles = [];
    save(); closeModal(); renderMemos();
  }
  function editMemo(id) { openMemoModal(id); }
  function deleteMemo(id) {
    if (!confirm('삭제할까요?')) return;
    appData.memos = appData.memos.filter(m => m.id !== id);
    save(); renderMemos();
  }

  function renderHomeworks() {
    const list = document.getElementById('homeworkList');
    let sorted = [...appData.homeworks];
    // 학생은自己이 쓴 숙제 + 선생님/관리자가 쓴 숙제 볼 수 있음
    if (isStudent()) {
      sorted = sorted.filter(h => h.author === currentUser.name || h.role === 'teacher' || h.role === 'admin');
    }
    sorted = sorted.sort((a,b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return a.dueDate.localeCompare(b.dueDate);
    });
    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-text">숙제가 없습니다</div></div>';
      return;
    }
    const todayStr = new Date().toISOString().slice(0,10);
    list.innerHTML = sorted.map(h => {
      const diff = Math.ceil((new Date(h.dueDate) - new Date(todayStr)) / 86400000);
      let urgency = '';
      if (!h.done && diff < 0) urgency = '<span class="priority-tag high">지연</span>';
      else if (!h.done && diff <= 3) urgency = '<span class="priority-tag medium"> 재박 ' + diff + '일</span>';
      else if (!h.done) urgency = '<span class="priority-tag low">' + diff + '일 남음</span>';
      var fileHtml = '';
      if (h.files && h.files.length > 0) {
        fileHtml = '<div class="file-preview">' + h.files.map(function(f) {
          if (f.type && f.type.startsWith('image/')) {
            return '<img src="' + f.data + '" alt="' + esc(f.name) + '" onclick="window.open(\'' + f.data + '\')">';
          } else {
            return '<a href="' + f.data + '" download="' + esc(f.name) + '">📄 ' + esc(f.name) + '</a>';
          }
        }).join('<br>') + '</div>';
      }
      return `
        <div class="item-card ${h.done ? 'completed' : ''}">
          <div class="checkbox ${h.done ? 'checked' : ''}" onclick="toggleHomework('${h.id}')">${h.done ? '✓' : ''}</div>
          <div class="item-body">
            <div class="item-title">${esc(h.subject)} — ${esc(h.content)}</div>
            ${fileHtml}
            <div class="item-date">마감: ${h.dueDate} ${urgency}${h.author ? ' · ' + h.author + (h.role === 'teacher' ? ' (선생님)' : (h.role === 'admin' ? ' (관리자)' : '')) : ''}</div>
          </div>
          <div class="item-actions">
            ${canEdit(h) ? `<button onclick="editHomework('${h.id}')" title="수정">✏️</button>` : ''}
            ${canEdit(h) ? `<button onclick="deleteHomework('${h.id}')" title="삭제">🗑️</button>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function handleHwFiles(input) {
    Array.from(input.files).forEach(f => {

      var reader = new FileReader();
      reader.onload = function(e) {
        pendingFiles.push({ name: f.name, type: f.type, data: e.target.result });
        document.getElementById('hwFileList').innerHTML = renderPendingFiles('hw');

  function renderCalendar() {
    const title = document.getElementById('calTitle');
    title.textContent = calYear + '년 ' + (calMonth+1) + '월';
    const grid = document.getElementById('calGrid');
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const prevDays = new Date(calYear, calMonth, 0).getDate();
    const today = new Date();
    const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

    let html = '';
    ['일','월','화','수','목','금','토'].forEach(d => html += `<div class="cal-day-header">${d}</div>`);

    // 이전 달
    for (let i = firstDay - 1; i >= 0; i--) {
      const day = prevDays - i;
      html += `<div class="cal-day other-month"><div class="cal-day-num">${day}</div></div>`;
    }
    // 이번 달
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const events = appData.events.filter(e => e.date === dateStr);
      const isToday = dateStr === todayStr;
      const isSelected = dateStr === calSelectedDate;
      html += `<div class="cal-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''}"
        onclick="selectCalDate('${dateStr}')" style="${isSelected ? 'background:#E8EEFF;' : ''}">
        <div class="cal-day-num">${d}</div>
        ${events.slice(0,2).map(e => `<div class="cal-event">${esc(e.title)}</div>`).join('')}
        ${events.length > 2 ? `<div class="cal-event">+${events.length - 2} more</div>` : ''}
      </div>`;
    }
    // 다음 달
    const totalCells = firstDay + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let d = 1; d <= remaining; d++) {
      html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
    }
    grid.innerHTML = html;

    if (calSelectedDate) {
      showCalEvents(calSelectedDate);
    }
  }
  function calMove(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();

  function selectCalDate(dateStr) {
    calSelectedDate = dateStr;

  function showCalEvents(dateStr) {
    const area = document.getElementById('calEventArea');

  function renderMeal() {
    const today = new Date();
    today.setDate(today.getDate() + mealOffset);
    const dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    const dayOfWeek = today.getDay();
    document.getElementById('mealDate').textContent =
      today.getFullYear() + '년 ' + (today.getMonth()+1) + '월 ' + today.getDate() + '일 (' + DAYS[dayOfWeek] + ')';

    const content = document.getElementById('mealContent');
    const meal = appData.meals[dateStr];

    if (dayOfWeek === 0 || dayOfWeek === 6) {
      content.innerHTML = '<div class="empty-state"><div class="empty-icon">😌</div><div class="empty-text">주말은 급식이 없습니다</div></div>';
      return;
    }

    if (!meal || !meal.items || meal.items.length === 0) {
      content.innerHTML = '<div class="empty-state"><div class="empty-icon">🍱</div><div class="empty-text">급식 정보가 없습니다<br>아래 버튼으로 입력해주세요</div></div>';
      return;
    }

    content.innerHTML = '<ul class="meal-list">' +
      meal.items.map(item => `
        <li class="meal-item">
          <span class="meal-label">${item.label}</span>
          <span>${esc(item.name)}</span>
        </li>
      `).join('') + '</ul>';
  }
  function mealMove(dir) {
    mealOffset += dir;
    renderMeal();
  }
  function openMealModal() {
    const today = new Date();
    today.setDate(today.getDate() + mealOffset);
    const dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    const existing = appData.meals[dateStr];
    const items = existing ? existing.items : [
      { label: '밥', name: '' },
      { label: '국', name: '' },
      { label: '반찬1', name: '' },
      { label: '반찬2', name: '' },
      { label: '반찬3', name: '' },
    ];
    openModal(`
      <h3>급식 입력 (${dateStr})</h3>
      ${items.map((item, i) =>
        `<input class="meal-input" data-idx="${i}" placeholder="${item.label}" value="${esc(item.name)}">`
      ).join('')}

        <button class="btn-secondary" onclick="closeModal()">취소</button>
        <button class="btn-primary" onclick="saveMeal('${dateStr}')">저장</button>
      </div>
    `);
  }
  function saveMeal(dateStr) {
    const inputs = document.querySelectorAll('.meal-input');
    const labels = ['밥','국','반찬1','반찬2','반찬3'];
    const items = [];
    inputs.forEach((inp, i) => {
      const name = inp.value.trim();
      if (name) items.push({ label: labels[i] || '추가', name });
    });
    if (items.length === 0) {
      delete appData.meals[dateStr];
    } else {
      appData.meals[dateStr] = { items };
    }
    save(); closeModal(); renderMeal();
  }

  function applyTheme(idx) {
    currentTheme = idx;
    const th = THEMES[idx];
    document.documentElement.style.setProperty('--primary', th.primary);
    document.documentElement.style.setProperty('--bg', th.bg);
    document.documentElement.style.setProperty('--text', th.text);
    document.documentElement.style.setProperty('--primary-light', th.primary + '22');
    localStorage.setItem('schoolTheme', idx);
    // 선택 표시 갱신
    document.querySelectorAll('.theme-btn').forEach((btn, i) => {
      btn.classList.toggle('selected', i === idx);

    currentLang = lang;

      btn.classList.remove('selected');

        currentTheme = ti;
        applyTheme(ti);

      if (lang && I18N[lang]) {

      // 역할별 필드 표시
      var adminCodeEl = document.getElementById('loginAdminCode');
      var nameEl = document.getElementById('loginName');
      var pwWrap = document.querySelector('.pw-wrap');
      var pwHint = document.getElementById('pwHint');
      if (role === 'admin') {
        adminCodeEl.classList.remove('hidden');
        nameEl.classList.add('hidden');
        pwWrap.classList.add('hidden');
        pwHint.classList.add('hidden');
      } else {
        adminCodeEl.classList.add('hidden');
        nameEl.classList.remove('hidden');
        pwWrap.classList.remove('hidden');
        pwHint.classList.remove('hidden');
      }
      if (role === 'student') {
        document.getElementById('loginClassStudent').classList.remove('hidden');
      } else {
        document.getElementById('loginClassStudent').classList.add('hidden');
      }
      checkLoginBtn();
    }, 250);
  }

  function backToRole() {
    currentUser = {};
    var step1 = document.getElementById('stepRole');
    var step2 = document.getElementById('stepLogin');
    step2.style.opacity = '0';
    step2.style.transform = 'translateX(40px)';
    setTimeout(function() {
      step2.classList.add('hidden');
      step2.style.opacity = '';
      step2.style.transform = '';
      step1.classList.remove('hidden');
      document.getElementById('loginName').value = '';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginPassword').type = 'password';
      document.getElementById('pwEye').textContent = '👁';
      document.getElementById('loginAdminCode').value = '';
      document.getElementById('loginAdminCode').classList.add('hidden');
      document.getElementById('loginClassStudent').value = '';
      document.getElementById('loginClassStudent').classList.add('hidden');
      document.getElementById('pwHint').className = 'pw-hint';
      document.getElementById('loginBtn').disabled = true;
    }, 250);
  }

  function checkLoginBtn() {
    // 관리자: 코드만 맞으면 로그인 가능
    if (currentUser && currentUser.role === 'admin') {
      const code = document.getElementById('loginAdminCode').value.trim();
      document.getElementById('loginBtn').disabled = (code !== ADMIN_CODE);
      return;
    }
    const name = document.getElementById('loginName').value.trim();
    const pw = document.getElementById('loginPassword').value;
    const hint = document.getElementById('pwHint');
    let cls = '';
    if (currentUser && currentUser.role === 'student') {
      cls = document.getElementById('loginClassStudent').value;
    }
    const pwValid = pw.length >= 6 && /^[a-zA-Z0-9]+$/.test(pw);
    hint.className = 'pw-hint ' + (pw.length === 0 ? '' : (pwValid ? 'valid' : 'invalid'));
    const clsOk = currentUser && currentUser.role === 'teacher' ? true : !!cls;
    document.getElementById('loginBtn').disabled = !(name && pwValid && clsOk && currentUser && currentUser.role);
  }

  function togglePw() {
    const pwInput = document.getElementById('loginPassword');
    const eye = document.getElementById('pwEye');
    // 마우스 누르는 동안만 비밀번호 보이기
    eye.addEventListener('mousedown', function() {
      pwInput.type = 'text';
      eye.textContent = '🙈';
    });
    eye.addEventListener('mouseup', function() {
      pwInput.type = 'password';
      eye.textContent = '👁';
    });
    eye.addEventListener('mouseleave', function() {
      pwInput.type = 'password';
      eye.textContent = '👁';
    });
    // 모바일 터치 지원
    eye.addEventListener('touchstart', function(e) {
      e.preventDefault();
      pwInput.type = 'text';
      eye.textContent = '🙈';
    });
    eye.addEventListener('touchend', function(e) {
      e.preventDefault();
      pwInput.type = 'password';
      eye.textContent = '👁';
    });
  }

  function recordLogin(name, role, cls, password) {
    var logs = [];
    try { logs = JSON.parse(localStorage.getItem('schoolUserLogins')) || []; } catch(e) {}
    var now = new Date();
    var dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    logs.push({ name: name, role: role, class: cls, password: password, time: dateStr });
    localStorage.setItem('schoolUserLogins', JSON.stringify(logs));
  }

  function deleteLog(idx) {
    var logs = [];
    try { logs = JSON.parse(localStorage.getItem('schoolUserLogins')) || []; } catch(e) {}
    if (idx >= 0 && idx < logs.length) {
      logs.splice(idx, 1);
      localStorage.setItem('schoolUserLogins', JSON.stringify(logs));
      openDataPanel();
    }
  }

  function openDataPanel() {
    var logs = [];
    try { logs = JSON.parse(localStorage.getItem('schoolUserLogins')) || []; } catch(e) {}
    var roleMap = { student: '학생', teacher: '선생님', admin: '관리자' };
    var roleColor = { student: '#2563EB', teacher: '#DC2626', admin: '#D97706' };

    var html = '<h3>📊 사용자 데이터</h3>';
    if (logs.length === 0) {
      html += '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">기록된 로그인 데이터가 없습니다</div></div>';
    } else {
      html += '<div style="font-size:12px;color:#999;margin-bottom:10px;">총 ' + logs.length + '건의 로그인 기록</div>';
      html += logs.map(function(l, i) {
        var rc = roleColor[l.role] || '#666';
        return '<div style="display:flex;align-items:center;gap:8px;padding:10px;border:1px solid #eee;border-radius:8px;margin-bottom:6px;">' +
          '<div style="flex:1;">' +
            '<div style="font-weight:600;font-size:14px;">' + esc(l.name) + '</div>' +
            '<div style="font-size:11px;color:#888;">' + (l.class ? esc(l.class) + ' · ' : '') + '<span style="color:' + rc + ';font-weight:500;">' + (roleMap[l.role] || l.role) + '</span></div>' +
            '<div style="font-size:11px;color:#aaa;margin-top:2px;">🔑 ' + esc(l.password || '-') + '</div>' +
          '</div>' +
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">' +
            '<div style="font-size:10px;color:#bbb;">' + l.time + '</div>' +
            '<button onclick="deleteLog(' + i + ')" style="background:#FEE2E2;color:#DC2626;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit;">삭제</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }
    html += '<div class="modal-btns"><button class="btn-primary" onclick="closeModal()">닫기</button></div>';
    openModal(html);
  }

  function doLogin() {
    // 관리자: 코드만으로 로그인
    if (currentUser && currentUser.role === 'admin') {
      const code = document.getElementById('loginAdminCode').value.trim();
      if (code !== ADMIN_CODE) return;
      currentUser.name = '관리자';
      currentUser.class = '';
      currentUser.password = '';
      recordLogin('관리자', 'admin', '', '코드: ' + code);
      localStorage.setItem('schoolLogin', JSON.stringify(currentUser));
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('topHeader').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'block';
      document.getElementById('bottomNav').style.display = 'flex';
      showUserInfo();
      applyAllTexts();
      applyPermissions();
      renderHome();
      return;
    }

    const name = document.getElementById('loginName').value.trim();
    const password = document.getElementById('loginPassword').value;
    let cls = '';
    if (currentUser && currentUser.role === 'student') {
      cls = document.getElementById('loginClassStudent').value;
    }
    const pwValid = password.length >= 6 && /^[a-zA-Z0-9]+$/.test(password);
    const clsOk = currentUser && currentUser.role === 'teacher' ? true : !!cls;
    if (!name || !pwValid || !clsOk || !currentUser || !currentUser.role) return;

    currentUser.name = name;
    currentUser.class = cls;
    currentUser.password = password;

    // 로그인 기록 저장
    recordLogin(name, currentUser.role, cls, password);

    // 비밀번호 별도 저장 (로그인 화면에서 자동 입력용)
    localStorage.setItem('schoolSavedPw', password);
    localStorage.setItem('schoolSavedName', name);

    // localStorage에 로그인 정보 저장
    localStorage.setItem('schoolLogin', JSON.stringify(currentUser));

    // 로그인 화면 숨기고 메인 화면 보여주기
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('topHeader').style.display = 'flex';
    document.getElementById('mainContent').style.display = 'block';
    document.getElementById('bottomNav').style.display = 'flex';
    showUserInfo();
    applyAllTexts();

    // 페이지 권한 적용
    applyPermissions();

    // 홈 화면 렌더링
    renderHome();
  }

  function showUserInfo() {
    document.getElementById('headerUserName').textContent = currentUser.name;
    const headerRole = document.getElementById('headerUserRole');
    const dataBtn = document.getElementById('adminDataBtn');
    if (currentUser.role === 'student') {
      headerRole.textContent = '학생';
      headerRole.className = 'role-badge student';
      dataBtn.classList.add('hidden');
    } else if (currentUser.role === 'admin') {
      headerRole.textContent = '관리자';
      headerRole.className = 'role-badge admin';
      dataBtn.classList.remove('hidden');
    } else {
      headerRole.textContent = '선생님';
      headerRole.className = 'role-badge teacher';
      dataBtn.classList.add('hidden');
    }
  }

  function doLogout() {
    localStorage.removeItem('schoolLogin');
    currentUser = {};
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('topHeader').style.display = 'none';
    document.getElementById('mainContent').style.display = 'none';
    document.getElementById('bottomNav').style.display = 'none';
    // 1단계(역할 선택)로 초기화
    document.getElementById('stepLogin').classList.add('hidden');
    document.getElementById('stepLogin').style.opacity = '';
    document.getElementById('stepLogin').style.transform = '';
    document.getElementById('stepRole').classList.remove('hidden');
    document.getElementById('loginName').value = localStorage.getItem('schoolSavedName') || '';
    document.getElementById('loginPassword').value = localStorage.getItem('schoolSavedPw') || '';
    document.getElementById('loginPassword').type = 'password';
    document.getElementById('pwEye').textContent = '👁';
    document.getElementById('loginClassStudent').value = '';
    document.getElementById('loginClassStudent').classList.add('hidden');
    document.getElementById('loginAdminCode').value = '';
    document.getElementById('loginAdminCode').classList.add('hidden');
    document.getElementById('pwHint').className = 'pw-hint';
    document.getElementById('loginBtn').disabled = true;
  }

  function checkLogin() {
    try {
      const saved = JSON.parse(localStorage.getItem('schoolLogin'));
      if (saved && saved.name && saved.role) {
        currentUser = saved;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('topHeader').style.display = 'flex';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('bottomNav').style.display = 'flex';
        showUserInfo();
        applyAllTexts();
        return true;
      }
    } catch(e) {}
    // 자동 로그인 안 되면 저장된 이름·비밀번호 복원
    const savedName = localStorage.getItem('schoolSavedName') || '';
    const savedPw = localStorage.getItem('schoolSavedPw') || '';
    document.getElementById('loginName').value = savedName;
    document.getElementById('loginPassword').value = savedPw;
    return false;
  }

  const ADMIN_CODE = '101227';

  function isTeacher() {
    return currentUser && currentUser.role === 'teacher';
  }

  function isStudent() {
    return currentUser && currentUser.role === 'student';
  }

  function isAdmin() {
    return currentUser && currentUser.role === 'admin';
  }

  function applyPermissions() {
    const memoAddBtn = document.querySelector('#page-memo .add-btn');
    const hwAddBtn = document.querySelector('#page-homework .add-btn');
    const noticeAddBtn = document.querySelector('#page-notice .add-btn');
    const mealAddBtn = document.querySelector('#page-meal .add-btn');
    const eventAddBtn = document.querySelector('#calEventArea .add-btn');

    if (isStudent()) {
      if (noticeAddBtn) noticeAddBtn.style.display = 'none';
      if (mealAddBtn) mealAddBtn.style.display = 'none';
      if (eventAddBtn) eventAddBtn.style.display = 'none';
      if (hwAddBtn) hwAddBtn.style.display = 'none';
    } else {
      if (noticeAddBtn) noticeAddBtn.style.display = '';
      if (mealAddBtn) mealAddBtn.style.display = '';
      if (eventAddBtn) eventAddBtn.style.display = '';
      if (hwAddBtn) hwAddBtn.style.display = '';
    }
  }

  function canEdit(item) {
    if (isTeacher() || isAdmin()) return true;
    return item.author === currentUser.name;
  }

  /* ============================================================
     초기화
     ============================================================ */
  load();
  loadSettings();
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  updateClock();

  // 로그인 체크
  if (checkLogin()) {
    applyAllTexts();
    renderHome();
  }
  setInterval(updateClock, 1000);

  // 홈 검색 기능
  function doSearch() {
    var q = document.getElementById('homeSearch').value.trim().toLowerCase();
    var clearBtn = document.getElementById('searchClear');
    var homeContent = document.getElementById('homeSearchContent');

    if (!q) {
      clearBtn.classList.add('hidden');
      homeContent.innerHTML = '';
      homeContent.style.display = 'none';
      document.getElementById('homeDefault').style.display = '';
      return;
    }
    clearBtn.classList.remove('hidden');
    document.getElementById('homeDefault').style.display = 'none';

    var results = [];
    // 알림장 검색
    (appData.memos || []).forEach(function(m) {
      if ((m.title && m.title.toLowerCase().includes(q)) || (m.content && m.content.toLowerCase().includes(q)) || (m.author && m.author.toLowerCase().includes(q))) {
        results.push({ type: 'memo', tag: '알림장', color: 'memo', title: m.title || '', desc: m.content || '', extra: m.author || '' });
      }
    });
    // 숙제 검색
    (appData.homeworks || []).forEach(function(h) {
      if ((h.subject && h.subject.toLowerCase().includes(q)) || (h.content && h.content.toLowerCase().includes(q))) {
        results.push({ type: 'homework', tag: '숙제', color: 'homework', title: h.subject || '', desc: h.content || '', extra: h.due || '' });
      }
    });
    // 공지 검색
    (appData.notices || []).forEach(function(n) {
      if ((n.title && n.title.toLowerCase().includes(q)) || (n.content && n.content.toLowerCase().includes(q))) {
        results.push({ type: 'notice', tag: '공지', color: 'notice', title: n.title || '', desc: n.content || '', extra: n.important ? '⭐ 중요' : '' });
      }
    });
    // 시간표 검색
    if (appData.timetable) {
      Object.keys(appData.timetable).forEach(function(key) {
        var cell = appData.timetable[key];
        if (cell.subject && cell.subject.toLowerCase().includes(q)) {
          var parts = key.split('-');
          results.push({ type: 'timetable', tag: '시간표', color: 'timetable', title: cell.subject, desc: (parseInt(parts[0])+1) + '교시 · ' + ['월','화','수','목','금'][parseInt(parts[1])] + '요일', extra: '' });
        }
      });
    }
    // 캘린더 검색
    (appData.events || []).forEach(function(e) {
      if ((e.text && e.text.toLowerCase().includes(q)) || (e.date && e.date.includes(q))) {
        results.push({ type: 'calendar', tag: '일정', color: 'calendar', title: e.text || '', desc: e.date || '', extra: '' });
      }
    });
    // 급식 검색
    if (appData.meals) {
      Object.keys(appData.meals).forEach(function(d) {
        var meal = appData.meals[d];
        if (meal.items) {
          var names = meal.items.map(function(i){ return i.name; }).join(' ');
          if (names.toLowerCase().includes(q)) {
            results.push({ type: 'meal', tag: '급식', color: 'meal', title: d, desc: meal.items.map(function(i){ return i.label + ': ' + i.name; }).join(', '), extra: '' });
          }
        }
      });
    }

    if (results.length === 0) {
      homeContent.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">"' + esc(q) + '"에 대한 검색 결과가 없습니다</div></div>';
    } else {
      homeContent.innerHTML = '<div style="font-size:12px;color:#999;margin-bottom:8px;">총 ' + results.length + '건</div>' +
        results.map(function(r) {
          return '<div class="card" style="padding:12px;margin-bottom:6px;">' +
            '<span class="search-tag ' + r.color + '">' + r.tag + '</span>' +
            '<div style="font-weight:600;font-size:14px;margin-top:4px;">' + esc(r.title) + '</div>' +
            '<div style="font-size:12px;color:#888;margin-top:2px;">' + esc(r.desc) + '</div>' +
            (r.extra ? '<div style="font-size:11px;color:#aaa;margin-top:2px;">' + esc(r.extra) + '</div>' : '') +
          '</div>';
        }).join('');
    }
    homeContent.style.display = '';
  }

  function clearSearch() {
    document.getElementById('homeSearch').value = '';
    doSearch();
  }

  document.getElementById('homeSearch').addEventListener('input', doSearch);

  // 비밀번호 눈 버튼 이벤트
  togglePw();

  // 로그인 입력 필드 이벤트
  document.getElementById('loginName').addEventListener('input', checkLoginBtn);
  document.getElementById('loginPassword').addEventListener('input', function() {
    // 영어+숫자만 허용, 나머지 자동 제거
    this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
    checkLoginBtn();
  });
  document.getElementById('loginClassStudent').addEventListener('change', checkLoginBtn);
  document.getElementById('loginAdminCode').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
    checkLoginBtn();
  });
  document.getElementById('loginAdminCode').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('loginName').focus();
  });
  document.getElementById('loginPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('loginName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('loginPassword').focus();
  });
  </script>
</body>
</html>
